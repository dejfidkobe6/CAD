name: Deploy cad.besix.cz

on:
  push:
    branches:
      - main
    paths:
      - 'cad-besix-cz/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy na cad.besix.cz
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Injektovat DB credentials
        run: |
          for file in cad-besix-cz/api/cad.php cad-besix-cz/api/auth.php cad-besix-cz/login.php cad-besix-cz/sso-callback.php cad-besix-cz/index.php; do
            sed -i "s|\$DB_HOST = '.*';|\$DB_HOST = '${{ secrets.DB_HOST }}';|" $file
            sed -i "s|\$DB_NAME = '.*';|\$DB_NAME = '${{ secrets.DB_NAME }}';|" $file
            sed -i "s|\$DB_USER = '.*';|\$DB_USER = '${{ secrets.DB_USER }}';|" $file
            sed -i "s|\$DB_PASS = '.*';|\$DB_PASS = '${{ secrets.DB_PASS }}';|" $file
          done
          sed -i "s|SSO_SECRET_PLACEHOLDER|${{ secrets.SSO_SECRET }}|" cad-besix-cz/sso-callback.php

      - name: Deploy přes FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./cad-besix-cz/
          dangerous-clean-slate: true
          exclude: |
            **/.git*
            **/.git*/**
            **/README.md
            **/docs/**
            **/sql/**
