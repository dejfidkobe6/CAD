name: Deploy cad.besix.cz

on:
  push:
    branches:
      - main
    paths:
      - 'cad-besix-cz/**'

jobs:
  deploy:
    name: Deploy na cad.besix.cz
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Injektovat DB credentials do cad.php
        run: |
          sed -i "s|\$DB_HOST = '.*';|\$DB_HOST = '${{ secrets.DB_HOST }}';|" cad-besix-cz/api/cad.php
          sed -i "s|\$DB_NAME = '.*';|\$DB_NAME = '${{ secrets.DB_NAME }}';|" cad-besix-cz/api/cad.php
          sed -i "s|\$DB_USER = '.*';|\$DB_USER = '${{ secrets.DB_USER }}';|" cad-besix-cz/api/cad.php
          sed -i "s|\$DB_PASS = '.*';|\$DB_PASS = '${{ secrets.DB_PASS }}';|" cad-besix-cz/api/cad.php

      - name: Deploy přes FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./cad-besix-cz/
          exclude: |
            **/.git*
            **/.git*/**
            **/README.md
            **/docs/**
            **/sql/**
